<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitCanvas — Contribution Grid Poster Generator</title>
  <meta name="description" content="Generate high-resolution artistic posters from your GitHub contribution grid with gorgeous custom themes, shapes, and layouts.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar / Controllers -->
    <aside class="sidebar">
      <header class="sidebar-header">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
          <h1>GitCanvas</h1>
        </div>
        <p class="subtitle">Artistic contribution grid posters</p>
      </header>

      <div class="sidebar-scroll">
        <!-- Section: Identity & Text -->
        <section class="settings-card">
          <h2 class="section-title">Identity & Headers</h2>
          
          <div class="form-group">
            <label for="input-username">Username</label>
            <div class="input-wrapper">
              <span class="input-prefix">@</span>
              <input type="text" id="input-username" value="octocat" placeholder="github-username">
            </div>
          </div>

          <div class="form-group">
            <label for="input-title">Poster Title</label>
            <input type="text" id="input-title" value="CODE SCAPE" placeholder="Poster Title">
          </div>

          <div class="form-group">
            <label for="input-subtitle">Subtitle / Year</label>
            <input type="text" id="input-subtitle" value="52 WEEKS OF CREATIVE CONTEXT" placeholder="Subtitle">
          </div>
        </section>

        <!-- Section: Theme & Aesthetics -->
        <section class="settings-card">
          <h2 class="section-title">Visual Theme</h2>

          <div class="form-group">
            <label for="select-theme">Color Theme</label>
            <select id="select-theme">
              <option value="forest">Forest Green (Classic)</option>
              <option value="vaporwave" selected>Vaporwave (Retro-Neon)</option>
              <option value="sunset">Sunset Glow (Warm)</option>
              <option value="cyberpunk">Cyberpunk (High Contrast)</option>
              <option value="aurora">Aurora Borealis (Cosmic)</option>
            </select>
          </div>

          <div class="form-group">
            <label for="select-shape">Node Shape</label>
            <select id="select-shape">
              <option value="square">Square</option>
              <option value="round" selected>Rounded Rectangle</option>
              <option value="circle">Circle</option>
              <option value="diamond">Diamond</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="select-pattern">Mock Contribution Pattern</label>
            <select id="select-pattern">
              <option value="dynamic">Dynamic Waves (Organic)</option>
              <option value="stripes">Diagonal Energy</option>
              <option value="burst">Center Burst</option>
              <option value="weekend">Weekend Retreat (High/Low)</option>
              <option value="random">Pure Stochastic Noise</option>
            </select>
          </div>
        </section>

        <!-- Section: Geometry Sliders -->
        <section class="settings-card">
          <h2 class="section-title">Geometry & Scale</h2>

          <div class="form-group">
            <div class="slider-header">
              <label for="slider-size">Node Size</label>
              <span class="slider-value" id="val-size">14px</span>
            </div>
            <input type="range" id="slider-size" min="8" max="24" value="14" step="1">
          </div>

          <div class="form-group">
            <div class="slider-header">
              <label for="slider-gap">Node Gap</label>
              <span class="slider-value" id="val-gap">4px</span>
            </div>
            <input type="range" id="slider-gap" min="1" max="12" value="4" step="1">
          </div>

          <div class="form-group" id="radius-group">
            <div class="slider-header">
              <label for="slider-radius">Corner Radius</label>
              <span class="slider-value" id="val-radius">3px</span>
            </div>
            <input type="range" id="slider-radius" min="0" max="10" value="3" step="1">
          </div>

          <div class="form-group">
            <div class="slider-header">
              <label for="slider-glow">Glow Intensity</label>
              <span class="slider-value" id="val-glow">60%</span>
            </div>
            <input type="range" id="slider-glow" min="0" max="100" value="60" step="5">
          </div>
        </section>

        <!-- Section: Extras & Formatting -->
        <section class="settings-card">
          <h2 class="section-title">Poster Options</h2>
          
          <div class="checkbox-group">
            <label class="checkbox-container">
              <input type="checkbox" id="check-stats" checked>
              <span class="checkmark"></span>
              Show Statistics Legend
            </label>
          </div>
          
          <div class="checkbox-group">
            <label class="checkbox-container">
              <input type="checkbox" id="check-grid" checked>
              <span class="checkmark"></span>
              Show Decorative Grid Background
            </label>
          </div>

          <button id="btn-regenerate" class="btn btn-secondary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
            </svg>
            Regenerate Mock Data
          </button>
        </section>
      </div>

      <!-- Action Panel -->
      <footer class="sidebar-footer">
        <button id="btn-download-svg" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
          </svg>
          Download SVG (Vector)
        </button>
        <button id="btn-download-png" class="btn btn-primary-outline">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          Export PNG (High-Res)
        </button>
      </footer>
    </aside>

    <!-- Main Preview Workspace -->
    <main class="workspace">
      <div class="workspace-header">
        <span class="badge">Canvas Preview</span>
        <div class="stats-indicators">
          <div class="stat-bubble">
            <span class="stat-label">Total Commits</span>
            <span class="stat-value" id="display-commits">1,482</span>
          </div>
          <div class="stat-bubble">
            <span class="stat-label">Active Days</span>
            <span class="stat-value" id="display-days">245 / 365</span>
          </div>
          <div class="stat-bubble">
            <span class="stat-label">Longest Streak</span>
            <span class="stat-value" id="display-streak">32 days</span>
          </div>
        </div>
      </div>

      <div class="preview-area">
        <div class="poster-frame-wrapper">
          <!-- The SVG will be injected here by app.js -->
          <div id="canvas-container"></div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
